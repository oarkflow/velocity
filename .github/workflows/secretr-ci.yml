name: secretr-ci

on:
  pull_request:
    paths:
      - "cmd/secretr/**"
      - "internal/secretr/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/secretr-ci.yml"
  push:
    branches: ["main", "master"]
    paths:
      - "cmd/secretr/**"
      - "internal/secretr/**"
      - "go.mod"
      - "go.sum"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download modules
        run: go mod download

      - name: Build Secretr CLI
        run: go build ./cmd/secretr

      - name: Build Velocity CLI
        run: go build ./cmd/velocity

      - name: Test migrated Secretr packages
        run: go test ./internal/secretr/...

      - name: Pentest checks (automated)
        run: go test ./internal/secretr/pentest -v

      - name: Race test migrated Secretr packages
        run: go test -race ./internal/secretr/...

      - name: Full Secretr smoke flow
        run: ./scripts/secretr_full_smoke.sh
