name: secretr-security

on:
  pull_request:
    paths:
      - "cmd/secretr/**"
      - "internal/secretr/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/secretr-security.yml"
  push:
    branches: ["main", "master"]
    paths:
      - "cmd/secretr/**"
      - "internal/secretr/**"
      - "go.mod"
      - "go.sum"

jobs:
  sast-and-cve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download modules
        run: go mod download

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: gosec
        uses: securego/gosec@master
        with:
          args: ./internal/secretr/...

      - name: Trivy dependency and fs scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"

